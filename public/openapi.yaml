openapi: 3.1.0
info:
  title: FreeCustom.Email API
  version: 2.1.0
  description: |
    **Last updated:** March 2026

    Disposable email infrastructure for developers.

    All routes require `Authorization: Bearer fce_<key>` (developer API key), except `GET /v1/plans` which is public.

servers:
  - url: https://api2.freecustom.email
    description: Production

security:
  - BearerAuth: []

paths:
  # ─────────────────────────────────────────────────────────────────────────
  # Public v1 — Account
  # ─────────────────────────────────────────────────────────────────────────
  /v1/me:
    get:
      summary: Get current user (account info)
      operationId: getMe
      tags: [Public v1 - Account]
      description: Returns the authenticated developer's account info — plan, rate limits, feature flags, inbox count, and credit balance.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          headers:
            X-API-Plan:
              schema: { type: string, example: startup }
            X-RateLimit-Limit-Second:
              schema: { type: integer, example: 25 }
            X-RateLimit-Remaining-Second:
              schema: { type: integer, example: 24 }
            X-RateLimit-Limit-Month:
              schema: { type: integer, example: 500000 }
            X-RateLimit-Remaining-Month:
              schema: { type: integer, example: 458770 }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error401" }
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error429" }

  /v1/usage:
    get:
      summary: Get usage stats
      operationId: getUsage
      tags: [Public v1 - Account]
      description: Returns live usage stats for the current billing period.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/plans:
    get:
      summary: List plans and credit packages
      operationId: getPlans
      tags: [Public v1 - Account]
      description: Public endpoint — no auth required. Returns all available plans and credit packages.
      security: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlansResponse"

  # ─────────────────────────────────────────────────────────────────────────
  # Public v1 — Domains
  # ─────────────────────────────────────────────────────────────────────────
  /v1/domains:
    get:
      summary: List available domains
      operationId: listDomains
      tags: [Public v1 - Domains]
      description: |
        Returns the domains available for inbox creation, filtered by your plan:

        - **Free / Developer / Startup** — free-tier domains only.
        - **Growth / Enterprise** — free-tier + pro-tier domains.

        Results are cached for up to 5 minutes. New domains appear automatically
        without requiring a code change on your side.

        Tags on each domain:
        - `new` — recently added domain, shown for ~30 days.
        - `popular` — high-traffic domain.

        Domains that are expiring within 30 days include `expires_at` and
        `expires_in_days` as a heads-up to migrate inboxes. Healthy domains
        omit these fields entirely to keep the payload lean.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainsListResponse"
              examples:
                free_plan:
                  summary: Free / Developer / Startup plan
                  value:
                    success: true
                    count: 10
                    note: "Upgrade to Growth plan to access additional pro domains."
                    data:
                      - domain: "ditube.info"
                        tier: "free"
                        tags: ["popular"]
                      - domain: "ditplay.info"
                        tier: "free"
                        tags: ["popular"]
                      - domain: "ditapi.info"
                        tier: "free"
                        tags: []
                      - domain: "getnotify.io"
                        tier: "free"
                        tags: ["new"]
                        expires_at: "2026-04-01"
                        expires_in_days: 25
                        expiring_soon: true
                growth_plan:
                  summary: Growth / Enterprise plan
                  value:
                    success: true
                    count: 14
                    note: "Growth/Enterprise plan: free + pro domains included."
                    data:
                      - domain: "ditube.info"
                        tier: "free"
                        tags: ["popular"]
                      - domain: "inboxrelay.net"
                        tier: "pro"
                        tags: ["new"]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/domains/all:
    get:
      summary: List all domains with full metadata
      operationId: listDomainsAll
      tags: [Public v1 - Domains]
      description: |
        Same domain list as `GET /v1/domains` but always includes full expiry
        metadata for every domain — useful for dashboard integrations that
        monitor domain health or want to proactively alert users before a
        domain expires.

        Plan gating is identical: Growth / Enterprise see pro-tier domains,
        all other plans see free-tier only.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainsAllResponse"
              example:
                success: true
                count: 10
                data:
                  - domain: "ditube.info"
                    tier: "free"
                    tags: ["popular"]
                    expires_at: "2026-08-01"
                    expires_in_days: 147
                    expiring_soon: false
                    expired: false
                  - domain: "getnotify.io"
                    tier: "free"
                    tags: ["new"]
                    expires_at: "2026-04-01"
                    expires_in_days: 25
                    expiring_soon: true
                    expired: false
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ─────────────────────────────────────────────────────────────────────────
  # Public v1 — Inboxes
  # ─────────────────────────────────────────────────────────────────────────
  /v1/inboxes:
    get:
      summary: List inboxes
      operationId: listInboxes
      tags: [Public v1 - Inboxes]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxesListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      summary: Register an inbox
      operationId: createInbox
      tags: [Public v1 - Inboxes]
      description: |
        Registers an inbox for API use. The domain must appear in `GET /v1/domains`
        for your plan. Custom domain inboxes require Growth+ and prior domain
        verification in the dashboard.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inbox]
              properties:
                inbox:
                  type: string
                  format: email
                  example: "test@ditube.info"
      responses:
        "201":
          description: Inbox registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxCreatedResponse"
        "200":
          description: Inbox was already registered (idempotent)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Inbox already registered." }
                  inbox: { type: string }
        "400":
          description: Missing or invalid inbox address
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error400Inbox" }
        "403":
          description: Domain not allowed for your plan, or domain not verified
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error403Plan" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/inboxes/{inbox}:
    delete:
      summary: Unregister an inbox
      operationId: deleteInbox
      tags: [Public v1 - Inboxes]
      parameters:
        - name: inbox
          in: path
          required: true
          description: URL-encoded email address (e.g. test%40ditube.info)
          schema: { type: string }
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Unregistered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string }
        "404":
          description: Inbox not registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error: { type: string, example: "not_found" }
                  message: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ─────────────────────────────────────────────────────────────────────────
  # Public v1 — Messages
  # ─────────────────────────────────────────────────────────────────────────
  /v1/inboxes/{inbox}/messages:
    get:
      summary: List messages
      operationId: listMessages
      tags: [Public v1 - Messages]
      parameters:
        - name: inbox
          in: path
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: before
          in: query
          description: Message ID — returns messages older than this
          schema: { type: string }
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesListResponse"
        "403":
          description: Inbox not registered to this account
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error403Forbidden" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /v1/inboxes/{inbox}/messages/{id}:
    get:
      summary: Get a message
      operationId: getMessage
      tags: [Public v1 - Messages]
      parameters:
        - name: inbox
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageDetailResponse"
        "404":
          description: Message not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }
        "403":
          $ref: "#/components/responses/Forbidden"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      summary: Delete a message
      operationId: deleteMessage
      tags: [Public v1 - Messages]
      parameters:
        - name: inbox
          in: path
          required: true
          schema: { type: string }
        - name: id
          in: path
          required: true
          schema: { type: string }
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Message deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string }
        "404":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error404" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ─────────────────────────────────────────────────────────────────────────
  # Public v1 — OTP
  # ─────────────────────────────────────────────────────────────────────────
  /v1/inboxes/{inbox}/otp:
    get:
      summary: Get latest OTP
      operationId: getOtp
      tags: [Public v1 - OTP]
      description: |
        Returns the OTP and/or verification link from the most recent message
        that contains one. Requires Developer plan or higher.

        On Free plan, message list endpoints return `otp: "__DETECTED__"` as a
        hint that an OTP exists — use this endpoint (Developer+) to read the
        actual value.
      parameters:
        - name: inbox
          in: path
          required: true
          schema: { type: string }
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Success (OTP found or null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpResponse"
        "403":
          description: Plan too low — requires Developer plan ($7/mo) or above
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error403Plan" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Developer API key as Bearer token (e.g. `Bearer fce_xxx`)
    ApiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key as query parameter (alternative to Bearer header)

  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error401" }
    Forbidden:
      description: Forbidden (e.g. inbox not owned by this account)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error403Forbidden" }
    RateLimited:
      description: Rate limit exceeded (per-second or monthly quota)
      headers:
        Retry-After:
          schema: { type: integer, description: "Seconds to wait before retrying" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error429" }

  schemas:
    # ── Domains ─────────────────────────────────────────────────────────────
    DomainEntry:
      type: object
      required: [domain, tier, tags]
      properties:
        domain:
          type: string
          example: "ditube.info"
          description: Bare domain name (no leading @).
        tier:
          type: string
          enum: [free, pro]
          description: |
            `free` — available on all plans.
            `pro` — requires Growth or Enterprise plan.
        tags:
          type: array
          items:
            type: string
            enum: [new, popular]
          description: |
            `new` — recently added, shown for ~30 days.
            `popular` — high-traffic domain.
          example: ["popular"]
        expires_at:
          type: string
          format: date
          nullable: true
          description: |
            ISO 8601 date when the domain registration expires at the registrar.
            Only present when `expiring_soon` is true (within 30 days).
          example: "2026-04-01"
        expires_in_days:
          type: integer
          nullable: true
          description: Days remaining until expiry. Only present when `expiring_soon` is true.
          example: 25
        expiring_soon:
          type: boolean
          nullable: true
          description: |
            True when the domain expires within 30 days. Omitted entirely for
            healthy domains to keep the payload lean. When true, migrate inboxes
            to a different domain or your own custom domain.
          example: true

    DomainEntryFull:
      allOf:
        - $ref: "#/components/schemas/DomainEntry"
        - type: object
          required: [expires_at, expires_in_days, expiring_soon, expired]
          properties:
            expires_at:
              type: string
              format: date
              description: ISO 8601 registrar expiry date. Always present on this endpoint.
              example: "2026-08-01"
            expires_in_days:
              type: integer
              description: Days remaining until expiry. Always present on this endpoint.
              example: 147
            expiring_soon:
              type: boolean
              description: True when expiry is within 30 days. Always present on this endpoint.
              example: false
            expired:
              type: boolean
              description: True when the domain has already passed its expiry date.
              example: false

    DomainsListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          description: Total number of domains returned.
          example: 10
        note:
          type: string
          description: Human-readable note about plan gating.
          example: "Upgrade to Growth plan to access additional pro domains."
        data:
          type: array
          items:
            $ref: "#/components/schemas/DomainEntry"

    DomainsAllResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 10
        data:
          type: array
          items:
            $ref: "#/components/schemas/DomainEntryFull"

    # ── Account ──────────────────────────────────────────────────────────────
    MeResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            plan: { type: string, example: startup }
            credits: { type: integer, example: 25000 }
            features:
              type: object
              properties:
                otp_extraction: { type: boolean }
                attachments: { type: boolean }
                max_attachment_size_mb: { type: integer }
                custom_domains: { type: boolean }
                websocket: { type: boolean }
                max_ws_connections: { type: integer }
            rate_limits:
              type: object
              properties:
                requests_per_second: { type: integer }
                requests_per_month: { type: integer }
            inboxes_registered: { type: integer }

    UsageResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            plan: { type: string }
            period:
              type: object
              properties:
                month: { type: string }
                resets_at: { type: string, format: date-time }
            requests:
              type: object
              properties:
                used: { type: integer }
                limit: { type: integer }
                remaining: { type: integer }
                percent_used: { type: number }
            credits:
              type: object
              properties:
                balance: { type: integer }
                note: { type: string }
            rate_limit:
              type: object
              properties:
                requests_per_second: { type: integer }

    PlansResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            plans:
              type: array
              items:
                type: object
                properties:
                  name: { type: string }
                  label: { type: string }
                  price_usd: { type: integer }
                  requests_per_second: { type: integer }
                  requests_per_month: { type: integer }
                  features: { $ref: "#/components/schemas/PlanFeatures" }
            credit_packages:
              type: array
              items:
                type: object
                properties:
                  label: { type: string }
                  price_usd: { type: integer }
                  requests: { type: integer }

    PlanFeatures:
      type: object
      properties:
        otp_extraction: { type: boolean }
        attachments: { type: boolean }
        max_attachment_size_mb: { type: integer }
        custom_domains: { type: boolean }
        websocket: { type: boolean }
        max_ws_connections: { type: integer }

    # ── Inboxes ──────────────────────────────────────────────────────────────
    InboxesListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            inboxes: { type: array, items: { type: string } }
            count: { type: integer }

    InboxCreatedResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            inbox: { type: string }
            registered_at: { type: string, format: date-time }

    # ── Messages ─────────────────────────────────────────────────────────────
    MessageSummary:
      type: object
      properties:
        id: { type: string }
        from: { type: string }
        subject: { type: string }
        date: { type: string, format: date-time }
        has_attachment: { type: boolean }
        otp:
          type: string
          nullable: true
          description: |
            The extracted OTP code, or `__DETECTED__` on Free plan (upgrade to
            Developer+ or use `GET /v1/inboxes/{inbox}/otp` to read the value).
        verification_link: { type: string, nullable: true }

    MessagesListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            inbox: { type: string }
            messages: { type: array, items: { $ref: "#/components/schemas/MessageSummary" } }
            count: { type: integer }
            has_more: { type: boolean }

    MessageDetailResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            id: { type: string }
            from: { type: string }
            to: { type: string }
            subject: { type: string }
            date: { type: string, format: date-time }
            html: { type: string, nullable: true }
            text: { type: string, nullable: true }
            otp: { type: string, nullable: true }
            verification_link: { type: string, nullable: true }
            has_attachment: { type: boolean }
            attachments:
              type: array
              items:
                type: object
                properties:
                  filename: { type: string }
                  content_type: { type: string }
                  size_bytes: { type: integer }

    # ── OTP ──────────────────────────────────────────────────────────────────
    OtpResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            inbox: { type: string }
            otp: { type: string, nullable: true }
            verification_link: { type: string, nullable: true }
            from: { type: string, nullable: true }
            subject: { type: string, nullable: true }
            message_id: { type: string, nullable: true }
            received_at: { type: string, format: date-time, nullable: true }
            message: { type: string, nullable: true }

    # ── Errors ───────────────────────────────────────────────────────────────
    Error401:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string, enum: [unauthorized, key_revoked] }
        message: { type: string }
    Error403Forbidden:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string, example: "forbidden" }
        message: { type: string }
    Error403Plan:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string, enum: [plan_restriction, domain_not_verified] }
        message: { type: string }
        upgrade_url: { type: string, format: uri, nullable: true }
    Error400Inbox:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string, enum: [missing_field, invalid_inbox] }
        message: { type: string }
    Error404:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string, example: "not_found" }
        message: { type: string }
    Error429:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string, enum: [rate_limit_exceeded, monthly_quota_exceeded] }
        message: { type: string }
        upgrade_url: { type: string, format: uri, nullable: true }
        credits_url: { type: string, format: uri, nullable: true }
        hint: { type: string, nullable: true }

tags:
  - name: Public v1 - Account
    description: Account info, usage, and plans
  - name: Public v1 - Domains
    description: |
      List domains available for inbox creation.
      Results are plan-gated and Redis-cached (5-min TTL).
      New domains appear automatically without a code change.
  - name: Public v1 - Inboxes
    description: Register and manage inboxes
  - name: Public v1 - Messages
    description: List, get, and delete messages
  - name: Public v1 - OTP
    description: OTP and verification link extraction

x-websocket:
  url: "wss://api2.freecustom.email/v1/ws"
  description: |
    Real-time push for incoming emails. Requires Startup plan or higher.

    **Connection:** `wss://api2.freecustom.email/v1/ws?api_key=fce_...&mailbox=test@ditube.info`

    | Query param | Required | Description |
    |-------------|----------|-------------|
    | api_key     | Yes      | Developer API key |
    | mailbox     | No       | Subscribe to one inbox; omit for all registered inboxes |

    **Events (server → client):**
    - `connected` — On connect; includes plan, subscribed_to, max_connections, current_connections.
    - `new_message` — New email; includes inbox and message (id, from, subject, date, has_attachment, otp, verification_link).
    - `ping` — Heartbeat every 30s; client should respond with `pong`.

    **Close codes:**
    - 4001 — Invalid or missing API key
    - 4003 — Plan too low (WebSocket requires Startup+)
    - 4004 — Inbox not registered
    - 4029 — Connection limit reached